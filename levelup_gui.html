<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose a Pet to Level Up</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    /* surfaces */
    --bg:#0c0f1d;
    --panel:#161b30;
    --row:#1b2138;
    --line:#2c3556;
    /* text */
    --text:#eef1fb;
    --muted:#8b93b5;
    /* accents */
    --gold:#ffc83d;
    --violet:#7c5cff;
    --emerald:#36e0a0;

    --radius:26px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    font-family:"Inter",system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 800px at 50% -10%, #1a2140 0%, rgba(26,33,64,0) 55%),
      radial-gradient(900px 700px at 85% 110%, #241a4a 0%, rgba(36,26,74,0) 50%),
      var(--bg);
    display:grid;
    place-items:center;
    padding:24px;
  }

  /* ===== Modal ===== */
  .modal{
    position:relative;
    width:100%;
    max-width:430px;
    background:linear-gradient(180deg, rgba(28,34,58,.92), rgba(18,22,40,.92));
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border:1px solid rgba(124,92,255,.18);
    border-radius:var(--radius);
    box-shadow:
      0 40px 90px -30px rgba(0,0,0,.75),
      0 0 0 1px rgba(255,255,255,.02) inset,
      0 1px 0 rgba(255,255,255,.06) inset;
    padding:26px 24px 22px;
    animation:pop .42s var(--ease) both;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(14px) scale(.97); } to{ opacity:1; transform:none; } }

  /* ===== Header ===== */
  .header{ text-align:center; padding:0 86px 18px; }
  .eyebrow{
    font-size:11px; font-weight:700; letter-spacing:.22em;
    text-transform:uppercase; color:var(--violet);
  }
  .title{
    font-family:"Fredoka",sans-serif; font-weight:700;
    font-size:24px; line-height:1.15; margin-top:6px;
    letter-spacing:.2px;
  }
  .subtitle{ margin-top:7px; font-size:13px; color:var(--muted); line-height:1.4; }

  /* token pill, top-right */
  .token-pill{
    position:absolute; top:22px; right:22px;
    display:inline-flex; align-items:center; gap:8px;
    padding:7px 13px 7px 8px;
    background:rgba(255,200,61,.10);
    border:1px solid rgba(255,200,61,.30);
    border-radius:999px;
    font-weight:700; font-size:14px;
    box-shadow:0 6px 18px -10px rgba(255,200,61,.5);
  }
  .coin{
    width:22px; height:22px; border-radius:50%;
    display:grid; place-items:center;
    font-size:13px; font-weight:800; color:#5a3d00;
    background:radial-gradient(circle at 35% 30%, #ffe9a8, var(--gold) 70%);
    box-shadow:0 0 0 1px rgba(255,255,255,.35) inset, 0 2px 6px rgba(0,0,0,.3);
  }
  .token-count{ color:var(--gold); min-width:18px; text-align:left; }

  /* ===== List ===== */
  .list{
    display:flex; flex-direction:column; gap:10px;
    max-height:340px; overflow-y:auto;
    padding:4px 8px 4px 2px;
    margin:2px -6px 0 0;
    scrollbar-width:thin;
    scrollbar-color:rgba(124,92,255,.55) transparent;
  }
  .list::-webkit-scrollbar{ width:8px; }
  .list::-webkit-scrollbar-track{ background:transparent; }
  .list::-webkit-scrollbar-thumb{
    background:rgba(124,92,255,.5); border-radius:999px;
    border:2px solid transparent; background-clip:padding-box;
  }
  .list::-webkit-scrollbar-thumb:hover{ background:rgba(124,92,255,.8); background-clip:padding-box; }

  /* ===== Pet row ===== */
  .pet{
    position:relative;
    display:grid;
    grid-template-columns:48px 1fr auto;
    align-items:center;
    gap:14px;
    padding:11px 14px;
    background:var(--row);
    border:1px solid var(--line);
    border-radius:16px;
    cursor:pointer;
    text-align:left;
    color:inherit; font:inherit;
    transition:transform .18s var(--ease), background .18s var(--ease),
               border-color .18s var(--ease), box-shadow .18s var(--ease);
  }
  .pet:hover{ transform:translateY(-2px); background:#212a47; border-color:#3a4470; }
  .pet:focus-visible{ outline:2px solid var(--violet); outline-offset:2px; }

  .pet.selected{
    border-color:var(--violet);
    background:linear-gradient(180deg, rgba(124,92,255,.16), rgba(124,92,255,.06));
    box-shadow:0 0 0 1px var(--violet), 0 14px 30px -14px rgba(124,92,255,.65);
  }

  .check{
    position:absolute; top:-8px; right:-8px;
    width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center;
    background:var(--violet); color:#fff;
    font-size:13px; font-weight:800;
    border:2px solid var(--panel);
    box-shadow:0 4px 12px -2px rgba(124,92,255,.7);
    opacity:0; transform:scale(.4);
    transition:opacity .18s var(--ease), transform .18s var(--ease);
  }
  .pet.selected .check{ opacity:1; transform:scale(1); }

  .avatar{
    width:48px; height:48px; border-radius:14px;
    display:grid; place-items:center; font-size:25px;
    background:linear-gradient(160deg, #2a3358, #1a2038);
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 6px 14px -8px rgba(0,0,0,.6);
  }

  .info{ min-width:0; }
  .pet-name{
    font-family:"Fredoka",sans-serif; font-weight:600;
    font-size:16px; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .xp{ display:flex; align-items:center; gap:9px; margin-top:7px; }
  .xp-track{
    position:relative; flex:1; height:7px; border-radius:999px;
    background:rgba(255,255,255,.07); overflow:hidden;
  }
  .xp-fill{
    height:100%; border-radius:999px;
    background:linear-gradient(90deg, var(--violet), #a78bff);
    box-shadow:0 0 10px rgba(124,92,255,.55);
    transition:width .6s var(--ease);
  }
  .xp-pct{ font-size:11px; font-weight:600; color:var(--muted); min-width:30px; text-align:right; }

  .level{ display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .lv-badge{
    font-family:"Fredoka",sans-serif; font-weight:700; font-size:13px;
    color:var(--gold);
    padding:4px 10px; border-radius:999px;
    background:rgba(255,200,61,.12);
    border:1px solid rgba(255,200,61,.28);
    white-space:nowrap;
  }
  .lv-next{ font-size:10.5px; color:var(--muted); font-weight:600; }
  .lv-badge.bump{ animation:bump .5s var(--ease); }
  @keyframes bump{ 0%{ transform:scale(1); } 35%{ transform:scale(1.22); } 100%{ transform:scale(1); } }

  /* ===== Footer ===== */
  .footer{
    display:flex; gap:12px; align-items:center;
    margin-top:20px; padding-top:18px;
    border-top:1px solid var(--line);
  }
  .btn{
    font:inherit; font-weight:700; font-size:15px;
    border-radius:14px; cursor:pointer; border:1px solid transparent;
    transition:transform .15s var(--ease), background .18s var(--ease),
               border-color .18s var(--ease), box-shadow .18s var(--ease), opacity .18s var(--ease);
  }
  .btn:focus-visible{ outline:2px solid var(--violet); outline-offset:2px; }
  .btn:active{ transform:translateY(1px); }

  .btn-cancel{
    padding:13px 20px;
    background:transparent; color:var(--muted);
    border-color:var(--line);
  }
  .btn-cancel:hover{ color:var(--text); border-color:#3a4470; background:rgba(255,255,255,.03); }

  .btn-confirm{
    flex:1;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    padding:13px 20px;
    color:#04130c;
    background:linear-gradient(180deg, #4bf0b0, var(--emerald));
    box-shadow:0 14px 28px -12px rgba(54,224,160,.7);
  }
  .btn-confirm:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 18px 34px -12px rgba(54,224,160,.8); }
  .btn-confirm:disabled{
    cursor:not-allowed;
    color:var(--muted);
    background:var(--row);
    border-color:var(--line);
    box-shadow:none;
  }
  .cost{
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 9px; border-radius:999px;
    background:rgba(4,19,12,.22); color:#04130c;
    font-size:12px; font-weight:800;
  }
  .btn-confirm:disabled .cost{ display:none; }
  .cost .coin{ width:16px; height:16px; font-size:10px; }

  @media (max-width:460px){
    .modal{ padding:22px 16px 18px; }
    .header{ padding:0 0 16px; }
    .token-pill{ position:static; margin:0 auto 14px; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<main class="modal" role="dialog" aria-modal="true" aria-labelledby="lvl-title">
  <div class="token-pill" title="Level-up tokens">
    <span class="coin" aria-hidden="true">↑</span>
    <span class="token-count" id="tokenCount">51</span>
  </div>

  <header class="header">
    <p class="eyebrow">Daily Crate</p>
    <h1 class="title" id="lvl-title">Choose a Pet to Level Up</h1>
    <p class="subtitle">Spend a token to grant the next level instantly.</p>
  </header>

  <div class="list" id="petList" role="listbox" aria-label="Your pets"></div>

  <footer class="footer">
    <button class="btn btn-cancel" id="cancelBtn" type="button">Cancel</button>
    <button class="btn btn-confirm" id="confirmBtn" type="button" disabled>
      <span id="confirmLabel">Level Up</span>
      <span class="cost" id="costChip"><span class="coin" aria-hidden="true">↑</span>1</span>
    </button>
  </footer>
</main>

<script>
(() => {
  "use strict";

  // ===== Pet data (drives the list — add an entry to add a pet) =====
  // Emoji is chosen to fit the food/animal the pet name references.
  const PETS = [
    { name: "Blossom Bunny",     emoji: "🌸", level: 3, xp: 72 },
    { name: "Broccoli Bunny",    emoji: "🥦", level: 1, xp: 30 },
    { name: "Burrito Armadillo", emoji: "🌯", level: 1, xp: 15 },
    { name: "Butter Duck",       emoji: "🧈", level: 1, xp: 55 },
    { name: "Coconut Crab",      emoji: "🥥", level: 2, xp: 88 },
    { name: "Pepper Pup",        emoji: "🌶️", level: 4, xp: 40 },
    { name: "Cherry Cat",        emoji: "🍒", level: 2, xp: 64 },
    { name: "Melon Moose",       emoji: "🍈", level: 5, xp: 21 },
    { name: "Pumpkin Pig",       emoji: "🎃", level: 1, xp: 90 },
    { name: "Sushi Seal",        emoji: "🍣", level: 3, xp: 48 },
    { name: "Banana Bear",       emoji: "🍌", level: 6, xp: 12 },
    { name: "Grape Gecko",       emoji: "🍇", level: 2, xp: 77 },
  ];

  let tokens = 51;
  let selected = null; // index into PETS

  const listEl     = document.getElementById("petList");
  const tokenEl    = document.getElementById("tokenCount");
  const cancelBtn  = document.getElementById("cancelBtn");
  const confirmBtn = document.getElementById("confirmBtn");
  const confirmLbl = document.getElementById("confirmLabel");
  const costChip   = document.getElementById("costChip");

  const rows = []; // per-pet { el, fill, pct, badge, next }

  // ===== Build a single row =====
  function makeRow(pet, index){
    const el = document.createElement("button");
    el.type = "button";
    el.className = "pet";
    el.setAttribute("role", "option");
    el.setAttribute("aria-selected", "false");

    el.innerHTML = `
      <span class="check" aria-hidden="true">✓</span>
      <span class="avatar" aria-hidden="true"></span>
      <span class="info">
        <span class="pet-name"></span>
        <span class="xp">
          <span class="xp-track"><span class="xp-fill"></span></span>
          <span class="xp-pct"></span>
        </span>
      </span>
      <span class="level">
        <span class="lv-badge"></span>
        <span class="lv-next"></span>
      </span>`;

    const refs = {
      el,
      avatar: el.querySelector(".avatar"),
      name:   el.querySelector(".pet-name"),
      fill:   el.querySelector(".xp-fill"),
      pct:    el.querySelector(".xp-pct"),
      badge:  el.querySelector(".lv-badge"),
      next:   el.querySelector(".lv-next"),
    };

    refs.avatar.textContent = pet.emoji;
    refs.name.textContent = pet.name;
    el.setAttribute("aria-label", `${pet.name}, level ${pet.level}, ${pet.xp}% to next level`);
    paint(refs, pet);

    el.addEventListener("click", () => select(index));

    rows[index] = refs;
    return el;
  }

  // Apply a pet's current numbers to its row.
  function paint(refs, pet){
    refs.badge.textContent = `Lv ${pet.level}`;
    refs.next.textContent = `→ Lv ${pet.level + 1}`;
    refs.pct.textContent = `${Math.round(pet.xp)}%`;
    // next frame so width changes animate from the old value
    requestAnimationFrame(() => { refs.fill.style.width = `${pet.xp}%`; });
  }

  // ===== Render the whole list =====
  function render(){
    listEl.innerHTML = "";
    rows.length = 0;
    PETS.forEach((pet, i) => listEl.appendChild(makeRow(pet, i)));
  }

  // ===== Selection =====
  function select(index){
    selected = index;
    rows.forEach((r, i) => {
      const on = i === index;
      r.el.classList.toggle("selected", on);
      r.el.setAttribute("aria-selected", on ? "true" : "false");
    });
    refreshConfirm();
  }

  function clearSelection(){
    selected = null;
    rows.forEach(r => {
      r.el.classList.remove("selected");
      r.el.setAttribute("aria-selected", "false");
    });
    refreshConfirm();
  }

  // ===== Footer state =====
  function refreshConfirm(){
    const pet = selected !== null ? PETS[selected] : null;
    if (pet && tokens > 0){
      confirmBtn.disabled = false;
      confirmLbl.textContent = `Level Up to ${pet.level + 1}`;
    } else {
      confirmBtn.disabled = true;
      confirmLbl.textContent = (pet && tokens <= 0) ? "Out of Tokens" : "Level Up";
    }
  }

  function updateTokens(){
    tokenEl.textContent = tokens;
  }

  // ===== Confirm: level up the selected pet =====
  function confirm(){
    if (selected === null || tokens <= 0) return;
    const pet = PETS[selected];
    const refs = rows[selected];

    pet.level += 1;
    pet.xp = 0;
    tokens -= 1;

    paint(refs, pet);
    refs.el.setAttribute("aria-label", `${pet.name}, level ${pet.level}, 0% to next level`);
    refs.badge.classList.remove("bump");
    void refs.badge.offsetWidth;       // restart the animation
    refs.badge.classList.add("bump");

    updateTokens();
    clearSelection();
  }

  // ===== Wire up =====
  confirmBtn.addEventListener("click", confirm);
  cancelBtn.addEventListener("click", clearSelection);

  render();
  updateTokens();
  refreshConfirm();
})();
</script>
</body>
</html>
